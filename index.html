<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026.06.06 瓜瓜生日快乐！</title>
    <style>
        /* --- 基础样式 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #4a4a4a;
            display: flex;
            min-height: 100vh;
            overflow: hidden; /* 防止海量弹窗和彩带让屏幕出现滚动条 */
            position: relative;
        }

        /* --- 全屏填充背景层 --- */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('bg.jpg'); 
            background-size: cover;       
            background-repeat: no-repeat;  
            z-index: -1;                   
        }

        /* 💻 电脑端（宽屏）优化：移到右下角，高度无所谓 */
        @media screen and (min-width: 769px) {
            body {
                justify-content: flex-end; 
                align-items: flex-end;
                padding-right: 8%; 
                padding-bottom: 6%; 
            }
            .page-background {
                background-position: 50% 12%; 
            }
        }

        /* 📱 手机端（竖屏）极致防挡脸优化 */
        @media screen and (max-width: 768px) {
            body {
                justify-content: flex-end; /* 严格靠底部对齐 */
                align-items: center;       
                padding-left: 20px;
                padding-right: 20px;
            }
            .page-background {
                background-position: center 5%
            }

        }

        /* --- 信件卡片样式（微透毛玻璃，内容可自主滚动） --- */
        .letter-container {
            background: rgba(255, 255, 255, 0.78); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 340px; 
            padding: 24px 22px 15px 22px; /* 调整内边距 */
            border-radius: 24px;
            box-shadow: 0 10px 35px rgba(40, 65, 95, 0.15);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: float 4s ease-in-out infinite;
            position: relative;
            z-index: 10;
            
            /* 开启卡片整体的Flex排版 */
            display: flex;
            flex-direction: column;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .letter-title {
            font-size: 1.3rem;
            color: #3a5fcd; 
            margin-bottom: 12px;
            font-weight: 600;
            flex-shrink: 0; /* 标题不参与挤压 */
        }

        /* 💡 滚动文案包裹区 */
        .scroll-content-area {
            overflow-y: auto; /* 核心：文字多了可以在这里面单独上下划动滚动 */
            flex-grow: 1;
            margin-bottom: 15px;
            padding-right: 4px;
            
            /* 隐藏自带的丑陋滚动条（让界面更干净） */
            scrollbar-width: none; /* Firefox */
        }
        .scroll-content-area::-webkit-scrollbar {
            display: none; /* Chrome Safari */
        }

        .letter-content {
            font-size: 0.92rem;
            line-height: 1.7;
            color: #4a5568;
            text-align: left;
            white-space: pre-line;
        }

        .open-btn {
            background-color: #f0f4f8;
            color: #3a5fcd;
            border: 2px solid #3a5fcd;
            padding: 9px 40px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(58, 95, 205, 0.15);
            display: inline-block;
            outline: none;
            flex-shrink: 0; /* 按钮始终固定在最下面 */
            width: fit-content;
            margin: 0 auto;
        }
        .open-btn:hover {
            background-color: #3a5fcd;
            color: #ffffff;
            transform: scale(1.03);
        }
        .open-btn:active {
            transform: scale(0.97);
        }

        /* --- 全屏彩带画布 --- */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* --- 弹窗样式 --- */
        .dialog-popup {
            position: fixed;
            background: rgba(38, 58, 84, 0.88); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(173, 216, 230, 0.35); 
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            color: #ffffff; 
            opacity: 0;
            transform: scale(0.4);
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            pointer-events: none;
            white-space: normal; 
            max-width: 80vw; 
            word-wrap: break-word;
            text-align: center;
        }
        @media screen and (min-width: 769px) {
            .dialog-popup { max-width: 320px; }
        }
        .dialog-popup.show { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>

    <!-- 全屏填充背景层 -->
    <div class="page-background"></div>

    <!-- 背景音频标签（隐藏） -->
    <audio id="bg-music" src="bgm.mp3" loop></audio>

    <!-- 信件主体卡片（高度锁死，多余文本可流畅下滑） -->
    <div class="letter-container">
        <h1 class="letter-title">瓜瓜生日快乐！</h1>
        
        <!-- 新增局部滚动安全区 -->
        <div class="scroll-content-area">
            <div class="letter-content">祝我们的瓜瓜生日快乐！
                祝我们瓜瓜的19岁生日快乐，在过去一年瓜瓜也是成功地读完现在这个阶段，也马上要进入新的阶段了。 祝我们的瓜瓜在接下来的计算机工程顺顺利利。</div>
        </div>
        
        <button class="open-btn" onclick="startSurprise()">开启惊喜</button>
    </div>

    <!-- 彩带画布 -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        const dialogTexts = [
            "奔赴前方 逃出雨季",
            "走吧 我的副驾",
            "我在 愿望都能实现",
            "愿你此生 兴致盎然",
            "想和你化作自由的风 全世界都任我们穿梭",
            "你的每次胜利 我都想做第一个喝彩的人",
            "心之所念皆有回响",
            "前行之路尽为坦途",
            "我们会将所有阴雨天 都变成晴朗的日子",
            "不为世事所扰 不为人忧所困 愿永远轻松",
            "我的镜头自有意志 它的每一帧都为你对焦",
            "爱藏在每一次呼吸里 而温暖让爱意现形",
            "你是恒久闪耀的灯塔 为我漂泊的心领航",
            "摘下一朵宙云 赠予遥远的天际",
            "彗尾沉睡之地 两颗心偶然相遇",
            "摩托艇和摩托的共通之处?大概 是朝着有你的方向 一往无前 ",
            "暮色降临 鲸声揭开蔚蓝的面纱",
            "海浪拍打岸屿 白沙与星光共舞 祝愿伴随潮汐降临",
            "深海祈佑你自由热烈 爱与期待穿越时空回响 停驻瞬间永恒",
            "拿起手中的喷枪 任凭心意去定义世界的一切色彩",
            "在海洋的末端描绘浪花 在宇宙的边缘勾勒新生",
            "想与你坠入深海的幻梦中 在潮汐中交换彼此的呼吸",
            "始于微时的约定 久别重逢 化作莫逆于心的相守",
            "未来漫长的余生 与你同行 哪里都是我心之所向",
            "爱藏在每一次呼吸里 而温暖让爱意现形",
            "你是恒久闪耀的灯塔 为我漂泊的心领航",
            "当宇宙将万有引力关停 你的引力依旧 带我驶向有你的目的地",
            "当世界被无边暗魔吞噬 你踏光而来 为我打造崭新的家园",
            "摘下一朵宙云 赠予遥远的天际",
            "迎风启航向你奔赴的航程",
            "跨越寰宇的边界 找寻一束破土新生的光",
            "长夜将星光收拢 潜入漫长而寂静的梦",
            "乘风破浪 超脱机械的极限让心跳声与指针同频",
            "波光粼粼粼 无声陷落于寂静深海里遇见天光",
            "日光炽热 水色连天汹涌海浪里聆听钟声的旋律",
            "唯有在你的视野中 我才能感受自由的韵律本身",
            "被你看见的意义在于 我能感知到自身的轻盈",
            "宇宙的规则是遗忘 我偏要逆流而上 封存关于你的每一个瞬间",
            "下个冬天 下下个冬天 以后每一个冬天 我都知道我们还是会在一起",
            "我会陪你一起去往所有未知的地方",
        ];

        const dialogElements = [];

        function startSurprise() {
            initConfetti();       
            showMassiveDialogs(); 
            playMusic();          
        }

        function playMusic() {
            const music = document.getElementById('bg-music');
            if (music) {
                music.play().catch(err => {
                    console.log("音频自动播放被拦截", err);
                });
            }
        }

        function initConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const pieceCount = window.innerWidth < 500 ? 65 : 140; 
            const pieces = [];
            const colors = ['#a2c2e8', '#e76f51', '#2a9d8f', '#e9c46a', '#3a5fcd', '#ccd5ae'];
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * -canvas.height - 20;
                    this.rotation = Math.random() * 360;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.diameter = Math.random() * 10 + 5;
                    this.speedX = Math.random() * 4 - 2;
                    this.speedY = Math.random() * 4 + 4;
                    this.rotationSpeed = Math.random() * 4 - 2;
                }
                update() {
                    this.x += this.speedX; this.y += this.speedY; this.rotation += this.rotationSpeed;
                    if (this.y > canvas.height) { this.y = -20; this.x = Math.random() * canvas.width; }
                }
                draw() {
                    ctx.save(); ctx.translate(this.x + this.diameter / 2, this.y + this.diameter / 2);
                    ctx.rotate(this.rotation * Math.PI / 180); ctx.fillStyle = this.color;
                    ctx.fillRect(-this.diameter / 2, -this.diameter / 2, this.diameter, this.diameter * 0.6); ctx.restore();
                }
            }
            
            for (let i = 0; i < pieceCount; i++) { pieces.push(new Particle()); }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function showMassiveDialogs() {
            const shuffledTexts = [...dialogTexts].sort(() => Math.random() - 0.5);
            const isMobile = window.innerWidth < 500;

            shuffledTexts.forEach((text, index) => {
                setTimeout(() => {
                    const dialog = document.createElement("div");
                    dialog.className = "dialog-popup";
                    dialog.textContent = text;

                    const minSize = isMobile ? 0.85 : 1.0;
                    const maxSize = isMobile ? 1.15 : 1.65;
                    const randomSize = (Math.random() * (maxSize - minSize) + minSize).toFixed(2);
                    
                    dialog.style.fontSize = `${randomSize}rem`;
                    dialog.style.padding = `${randomSize * 7}px ${randomSize * 14}px`;
                    dialog.style.zIndex = Math.floor(Math.random() * 100) + 100;
                    
                    document.body.appendChild(dialog);
                    dialogElements.push(dialog);

                    const dialogWidth = dialog.offsetWidth;
                    const dialogHeight = dialog.offsetHeight;

                    const paddingX = 15;
                    const paddingTop = isMobile ? 60 : 20; 
                    // 弹幕爆发时完全避开底部缩小的卡片，让视觉焦点集中在人脸周围
                    const paddingBottom = isMobile ? 260 : 20; 

                    const maxWidth = window.innerWidth - dialogWidth - (paddingX * 2);
                    const maxHeight = window.innerHeight - dialogHeight - paddingTop - paddingBottom;
                    
                    const randomX = Math.max(paddingX, Math.floor(Math.random() * maxWidth) + paddingX);
                    const randomY = Math.max(paddingTop, Math.floor(Math.random() * maxHeight) + paddingTop);
                    
                    dialog.style.left = `${randomX}px`;
                    dialog.style.top = `${randomY}px`;
                    
                    setTimeout(() => dialog.classList.add("show"), 20);
                    
                    setTimeout(() => {
                        dialog.classList.remove("show");
                        setTimeout(() => {
                            const idx = dialogElements.indexOf(dialog);
                            if (idx !== -1) dialogElements.splice(idx, 1);
                            dialog.remove();
                        }, 400);
                    }, 7500);

                }, index * 260);
            });
        }

        window.addEventListener("resize", () => {
            dialogElements.forEach(dialog => {
                const maxX = window.innerWidth - dialog.offsetWidth - 10;
                const maxY = window.innerHeight - dialog.offsetHeight - 10;
                const currentX = parseInt(dialog.style.left) || 0;
                const currentY = parseInt(dialog.style.top) || 0;
                dialog.style.left = `${Math.max(10, Math.min(currentX, maxX))}px`;
                dialog.style.top = `${Math.max(10, Math.min(currentY, maxY))}px`;
            });
        });

        document.addEventListener("WeixinJSBridgeReady", function () {
            const music = document.getElementById('bg-music');
            if (music) { music.load(); }
        }, false);

        window.addEventListener("beforeunload", () => {
            dialogElements.forEach(dialog => dialog.remove());
        });
    </script>
</body>
</html>
